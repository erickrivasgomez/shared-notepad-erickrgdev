name: Keep Services Alive

on:
  schedule:
    # Cada 5 días a las 10:00 UTC
    - cron: '0 10 */5 * *'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app (keep Vercel + Supabase active)
        run: |
          echo "Pinging notas.erickrg.dev..."
          curl -f https://notas.erickrg.dev/api/ping || echo "Ping failed but continuing"
          echo "Ping complete at $(date)"
      
      - name: Ping Supabase directly
        run: |
          curl -f "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            || echo "Supabase ping failed but continuing"
